name: Data Ingestion

on:
  schedule:
    # Weekly during season (Apr–Oct): Mondays at 6am UTC
    - cron: '0 6 * * 1'
    # Monthly off-season (Nov–Mar): 1st of month at 6am UTC
    - cron: '0 6 1 11,12,1,2,3 *'
  workflow_dispatch:  # allow manual trigger

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ingestion
        run: python -m src.ingest.pull_data
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}

      - name: Scrape contracts
        run: python -m src.ingest.scrape_contracts
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}

      - name: Commit updated extracts
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/tableau_data_extracts/*.csv || true
          git diff --staged --quiet || git commit -m "chore: scheduled data refresh $(date -u +%Y-%m-%d)"
          git push
